name: trading_diary
description: "Stock Trading Diary - KOSPI/KOSDAQ/NASDAQ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.2
  http: ^1.2.2
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  google_mobile_ads: ^9.0.0
  app_tracking_transparency: ^2.0.7
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^4.1.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/

# ---------------------------------------------------------------------------
# App icon
# ---------------------------------------------------------------------------
# Generates every per-platform launcher icon from a single 1024×1024 source
# PNG. Replace assets/branding/app_icon.png with your final design and rerun
# `dart run flutter_launcher_icons`. For Android 8+ adaptive icons the
# foreground layer (logo on transparent background) is composed over the
# brand-color background so the OS can mask the icon in any shape.
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  ios: true
  android: true
  web:
    generate: false  # web favicon is generated separately if needed
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"

# ---------------------------------------------------------------------------
# Native splash
# ---------------------------------------------------------------------------
# Generates the Android 12+ splash theme and the iOS launch storyboard from
# the same source image. Both light and dark variants are wired up so the
# splash follows the system theme.
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#101114"
  image: "assets/branding/splash_logo.png"
  image_dark: "assets/branding/splash_logo_dark.png"
  android_12:
    color: "#ffffff"
    color_dark: "#101114"
    image: "assets/branding/splash_logo.png"
    image_dark: "assets/branding/splash_logo_dark.png"
